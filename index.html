<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Employee Hiring & Joining Form | IMPOST INDIA</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #063647;
        --navy-deep: #032733;
        --teal: #009a96;
        --teal-soft: #e9f7f6;
        --blue: #2563a8;
        --ink: #172d36;
        --muted: #61747c;
        --line: #cedbe0;
        --paper: #fff;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: #edf4f6;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
      }
      button,
      input,
      select,
      textarea {
        font: inherit;
      }
      .app-header {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 14px 24px;
        color: #fff;
        background: linear-gradient(
          120deg,
          var(--navy-deep),
          var(--navy) 65%,
          #007d80
        );
        box-shadow: 0 7px 25px rgba(2, 35, 47, 0.22);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 11px;
      }
      .brand-mark {
        display: grid;
        place-items: center;
        width: 43px;
        height: 43px;
        border-radius: 12px;
        color: var(--navy);
        background: linear-gradient(145deg, #73eee5, #22c7bb);
        font-size: 20px;
        font-weight: 900;
      }
      .brand strong,
      .brand small {
        display: block;
      }
      .brand strong {
        font-size: 15px;
        letter-spacing: 0.04em;
      }
      .brand small {
        color: #9be9e5;
        font-size: 9px;
      }
      .header-title {
        text-align: center;
      }
      .header-title strong {
        display: block;
        font-size: 16px;
      }
      .header-title small {
        color: #b9dfdf;
        font-size: 9px;
      }
      .header-actions {
        display: flex;
        gap: 8px;
      }
      .header-actions button {
        min-height: 38px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 9px;
        padding: 7px 12px;
        color: #fff;
        background: rgba(255, 255, 255, 0.09);
        font-size: 10px;
        font-weight: 800;
      }
      .header-actions .primary {
        border: 0;
        color: #043342;
        background: #62e6dc;
      }
      .app-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 430px;
        gap: 20px;
        width: min(1540px, calc(100% - 30px));
        margin: 20px auto 36px;
      }
      .form-column,
      .preview-column {
        min-width: 0;
      }
      .form-intro {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 14px;
        padding: 18px 20px;
        border: 1px solid #cbdadd;
        border-radius: 15px;
        background: #fff;
        box-shadow: 0 7px 22px rgba(6, 54, 71, 0.07);
      }
      .form-intro small {
        color: var(--teal);
        font-size: 9px;
        font-weight: 900;
        letter-spacing: 0.12em;
      }
      .form-intro h1 {
        margin: 4px 0;
        font-size: 22px;
        font-weight: 850;
      }
      .form-intro p {
        margin: 0;
        color: var(--muted);
        font-size: 10px;
      }
      .autosave {
        color: #137747;
        font-size: 9px;
        font-weight: 800;
        white-space: nowrap;
      }
      .form-section {
        margin-bottom: 14px;
        overflow: hidden;
        border: 1px solid #ccd9de;
        border-radius: 15px;
        background: #fff;
        box-shadow: 0 7px 22px rgba(6, 54, 71, 0.06);
      }
      .section-head {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 14px 17px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(90deg, #f4fafb, #fff);
      }
      .section-head i {
        display: grid;
        place-items: center;
        width: 35px;
        height: 35px;
        border-radius: 9px;
        color: #007e7b;
        background: var(--teal-soft);
        font-size: 15px;
      }
      .section-head h2 {
        margin: 0;
        font-size: 14px;
        font-weight: 850;
      }
      .section-head small {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 8px;
      }
      .section-content {
        padding: 17px;
      }
      .field-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 13px;
      }
      .span-2 {
        grid-column: span 2;
      }
      .span-3 {
        grid-column: 1 / -1;
      }
      .field label {
        display: block;
        margin-bottom: 5px;
        color: #425c66;
        font-size: 8px;
        font-weight: 850;
        letter-spacing: 0.045em;
        text-transform: uppercase;
      }
      .form-control,
      .form-select {
        min-height: 39px;
        border-color: #c9d6db;
        border-radius: 9px;
        color: var(--ink);
        font-size: 10px;
      }
      textarea.form-control {
        min-height: 74px;
        resize: vertical;
      }
      .form-control:focus,
      .form-select:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 0.18rem rgba(0, 154, 150, 0.12);
      }
      .photo-field {
        display: grid;
        grid-template-columns: 98px 1fr;
        gap: 14px;
        align-items: center;
      }
      .photo-preview {
        display: grid;
        place-items: center;
        width: 98px;
        height: 120px;
        overflow: hidden;
        border: 1px dashed #9fb4bc;
        border-radius: 10px;
        color: #78909a;
        background: #f8fbfc;
        font-size: 24px;
      }
      .photo-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .repeat-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 8px;
      }
      .repeat-table th {
        padding: 0 5px 2px;
        color: #587079;
        font-size: 7px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .repeat-table td {
        padding: 0 4px;
      }
      .repeat-table input {
        min-width: 90px;
      }
      .repeat-table .remove-row {
        width: 30px;
        height: 30px;
        border: 0;
        color: #b23d3d;
        background: transparent;
      }
      .add-row {
        border: 1px solid #a7d4d1;
        border-radius: 8px;
        padding: 7px 10px;
        color: #007d79;
        background: #ecf9f8;
        font-size: 9px;
        font-weight: 800;
      }
      .repeater-actions {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .fresher-button {
        border: 1px solid #78909a;
        border-radius: 8px;
        padding: 7px 10px;
        color: #263f49;
        background: #fff;
        font-size: 9px;
        font-weight: 800;
      }
      .fresher-button.active {
        border-color: #007f7c;
        color: #fff;
        background: #007f7c;
      }
      .fresher-status {
        padding: 10px;
        border: 1px solid #8fb3b1;
        border-radius: 8px;
        color: #075e5b;
        background: #eef9f8;
        font-weight: 800;
      }
      .candidate-signature-print {
        display: none;
      }
      .check-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .check-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 9px;
        font-size: 9px;
      }
      .check-item input {
        accent-color: var(--teal);
      }
      .preview-column {
        position: relative;
      }
      .preview-panel {
        position: sticky;
        top: 84px;
        overflow: hidden;
        border: 1px solid #c5d3d8;
        border-radius: 15px;
        background: #dae4e8;
      }
      .preview-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        color: #fff;
        background: var(--navy);
      }
      .preview-head h2 {
        margin: 0;
        font-size: 12px;
      }
      .preview-head span {
        color: #9fe7e3;
        font-size: 8px;
      }
      .preview-scroll {
        max-height: calc(100vh - 135px);
        overflow: auto;
        padding: 13px;
      }
      .mini-page {
        width: 100%;
        aspect-ratio: 210 / 297;
        margin-bottom: 13px;
        padding: 17px;
        background: #fff;
        box-shadow: 0 4px 14px rgba(0, 34, 45, 0.17);
        transform-origin: top center;
      }
      .mini-page h3 {
        margin: 0 0 8px;
        color: var(--navy);
        font-size: 10px;
      }
      .mini-lines {
        display: grid;
        gap: 5px;
      }
      .mini-line {
        height: 5px;
        border-radius: 3px;
        background: #e1eaed;
      }
      .mini-line.short {
        width: 60%;
      }
      .toast-note {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 500;
        padding: 12px 15px;
        border-radius: 10px;
        color: #fff;
        background: #063647;
        box-shadow: 0 12px 30px rgba(0, 35, 45, 0.28);
        font-size: 10px;
      }

      #pdf-root {
        position: fixed;
        left: -10000px;
        top: 0;
        width: 210mm;
        background: #fff;
      }
      .pdf-page {
        position: relative;
        width: 210mm;
        height: 297mm;
        overflow: hidden;
        padding: 17mm 15mm 18mm;
        color: #182b34;
        background: #fff;
        font-family: Arial, sans-serif;
        page-break-after: always;
      }
      .pdf-page:last-child {
        page-break-after: auto;
      }
      .pdf-watermark {
        position: absolute;
        left: 50%;
        top: 53%;
        z-index: 0;
        color: rgba(4, 52, 67, 0.04);
        font-size: 31mm;
        font-weight: 900;
        letter-spacing: 2mm;
        transform: translate(-50%, -50%) rotate(-34deg);
        white-space: nowrap;
      }
      .pdf-content {
        position: relative;
        z-index: 1;
      }
      .pdf-header {
        display: grid;
        grid-template-columns: 45mm 1fr 28mm;
        align-items: center;
        gap: 5mm;
        padding-bottom: 4mm;
        border-bottom: 1.4mm solid var(--teal);
      }
      .pdf-brand {
        display: flex;
        align-items: center;
        gap: 3mm;
      }
      .pdf-logo {
        display: grid;
        place-items: center;
        width: 12mm;
        height: 12mm;
        border-radius: 3mm;
        color: #fff;
        background: var(--navy);
        font-size: 5mm;
        font-weight: 900;
      }
      .pdf-brand strong {
        display: block;
        color: var(--navy);
        font-size: 4mm;
      }
      .pdf-brand small {
        color: #55717b;
        font-size: 2.2mm;
      }
      .pdf-title {
        text-align: center;
      }
      .pdf-title h1 {
        margin: 0;
        color: var(--navy);
        font-size: 5.2mm;
        text-transform: uppercase;
      }
      .pdf-title p {
        margin: 1mm 0 0;
        color: #5c747d;
        font-size: 2.3mm;
      }
      .pdf-qr {
        display: grid;
        justify-items: end;
        gap: 1mm;
      }
      .pdf-qr canvas,
      .pdf-qr img {
        width: 18mm !important;
        height: 18mm !important;
      }
      .pdf-qr span {
        font-size: 2mm;
      }
      .pdf-meta {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 3mm;
        margin: 4mm 0;
        padding: 3mm;
        border: 0.3mm solid #b8c9cf;
        background: #f5f9fa;
      }
      .pdf-meta label,
      .pdf-value label {
        display: block;
        color: #607780;
        font-size: 2mm;
        font-weight: 700;
        text-transform: uppercase;
      }
      .pdf-meta b,
      .pdf-value b {
        display: block;
        margin-top: 0.7mm;
        color: #172d36;
        font-size: 2.7mm;
        font-weight: 600;
      }
      .pdf-section {
        margin-top: 3.5mm;
      }
      .pdf-section-title {
        margin: 0 0 2mm;
        padding: 2mm 3mm;
        color: #fff;
        background: var(--navy);
        font-size: 3mm;
        font-weight: 700;
        letter-spacing: 0.2mm;
        text-transform: uppercase;
      }
      .pdf-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        border-top: 0.3mm solid #aebfc5;
        border-left: 0.3mm solid #aebfc5;
      }
      .pdf-value {
        min-height: 12mm;
        padding: 2.2mm;
        border-right: 0.3mm solid #aebfc5;
        border-bottom: 0.3mm solid #aebfc5;
      }
      .pdf-value.wide {
        grid-column: span 2;
      }
      .pdf-value.full {
        grid-column: 1 / -1;
      }
      .pdf-candidate {
        display: grid;
        grid-template-columns: 1fr 30mm;
        gap: 4mm;
      }
      .pdf-photo {
        display: grid;
        place-items: center;
        width: 30mm;
        height: 38mm;
        border: 0.35mm solid #839aa3;
        color: #718890;
        font-size: 2.4mm;
        text-align: center;
        background: #fafcfd;
      }
      .pdf-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .pdf-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 2.45mm;
      }
      .pdf-table th {
        padding: 2.1mm 1.5mm;
        border: 0.3mm solid #94aab2;
        color: #fff;
        background: #315866;
        font-size: 2.2mm;
        text-align: left;
      }
      .pdf-table td {
        height: 9mm;
        padding: 1.8mm 1.5mm;
        border: 0.3mm solid #aebfc5;
        vertical-align: top;
      }
      .pdf-table.salary td:first-child {
        width: 55%;
        font-weight: 600;
      }
      .pdf-two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4mm;
      }
      .pdf-checks {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5mm 4mm;
        padding: 3mm;
        border: 0.3mm solid #aebfc5;
      }
      .pdf-check {
        display: flex;
        justify-content: space-between;
        gap: 2mm;
        padding-bottom: 1.3mm;
        border-bottom: 0.2mm dotted #aebfc5;
        font-size: 2.4mm;
      }
      .pdf-check b {
        color: #08766f;
      }
      .pdf-remarks {
        min-height: 18mm;
        padding: 3mm;
        border: 0.3mm solid #aebfc5;
        font-size: 2.5mm;
      }
      .declaration {
        padding: 4mm;
        border: 0.55mm solid var(--navy);
        background: #f7fafb;
        font-size: 2.6mm;
        line-height: 1.55;
        text-align: justify;
      }
      .candidate-sign {
        display: grid;
        grid-template-columns: 1fr 55mm;
        gap: 8mm;
        margin-top: 5mm;
      }
      .sign-line {
        padding-top: 10mm;
        border-bottom: 0.35mm solid #263e48;
        font-size: 2.3mm;
      }
      .signature-blocks {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4mm;
        margin-top: 5mm;
      }
      .pdf-signature {
        min-height: 37mm;
        padding: 3mm;
        border: 0.3mm solid #aebfc5;
      }
      .pdf-signature h3 {
        margin: 0;
        color: var(--navy);
        font-size: 2.7mm;
      }
      .pdf-signature .line {
        margin-top: 15mm;
        border-bottom: 0.35mm solid #263e48;
      }
      .pdf-signature p {
        margin: 3mm 0 0;
        font-size: 2.2mm;
      }
      .pdf-footer {
        position: absolute;
        left: 15mm;
        right: 15mm;
        bottom: 7mm;
        z-index: 2;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 4mm;
        padding-top: 2.5mm;
        border-top: 0.3mm solid #8ea5ad;
        color: #536d76;
        font-size: 2mm;
      }
      .pdf-footer strong {
        color: var(--navy);
      }
      .pdf-footer-text {
        grid-column: 1 / -1;
        font-size: 1.9mm;
        text-align: center;
      }

      @media (max-width: 1100px) {
        .app-layout {
          grid-template-columns: 1fr;
        }
        .preview-column {
          display: none;
        }
      }
      @media (max-width: 720px) {
        .app-header {
          align-items: flex-start;
          flex-wrap: wrap;
          padding: 12px 14px;
        }
        .header-title {
          order: 3;
          width: 100%;
          text-align: left;
        }
        .header-actions button span {
          display: none;
        }
        .app-layout {
          width: calc(100% - 18px);
          margin-top: 10px;
        }
        .form-intro {
          align-items: flex-start;
          flex-direction: column;
          padding: 15px;
        }
        .field-grid {
          grid-template-columns: 1fr;
        }
        .span-2,
        .span-3 {
          grid-column: auto;
        }
        .repeater-actions {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .fresher-button {
        border: 1px solid #78909a;
        border-radius: 8px;
        padding: 7px 10px;
        color: #263f49;
        background: #fff;
        font-size: 9px;
        font-weight: 800;
      }
      .fresher-button.active {
        border-color: #007f7c;
        color: #fff;
        background: #007f7c;
      }
      .fresher-status {
        padding: 10px;
        border: 1px solid #8fb3b1;
        border-radius: 8px;
        color: #075e5b;
        background: #eef9f8;
        font-weight: 800;
      }
      .candidate-signature-print {
        display: none;
      }
      .check-grid {
          grid-template-columns: 1fr;
        }
        .section-content {
          overflow-x: auto;
          padding: 14px;
        }
        .photo-field {
          grid-template-columns: 82px 1fr;
        }
        .photo-preview {
          width: 82px;
          height: 100px;
        }
      }

      /* Single-form layout and darker corporate tone */
      :root {
        --navy: #042d3b;
        --navy-deep: #021d27;
        --teal: #007f7c;
        --teal-soft: #d9eeec;
        --ink: #102630;
        --muted: #4c626c;
        --line: #aebfc5;
      }
      body {
        background: #d8e3e7;
      }
      .app-header {
        background: linear-gradient(120deg, #021d27, #043a4b 66%, #006f72);
      }
      .app-layout {
        display: block;
        width: min(1120px, calc(100% - 30px));
        margin: 20px auto 36px;
      }
      .form-column {
        min-width: 0;
        overflow: hidden;
        border: 1px solid #91a7b0;
        border-radius: 16px;
        background: #eef3f4;
        box-shadow: 0 18px 48px rgba(2, 29, 39, 0.18);
      }
      .form-intro {
        margin: 0;
        padding: 19px 22px;
        border: 0;
        border-bottom: 1px solid #91a7b0;
        border-radius: 0;
        background: #d5e2e6;
        box-shadow: none;
      }
      .form-intro h1 {
        color: #082d3a;
      }
      .form-section {
        margin: 0 18px;
        border: 0;
        border-bottom: 1px solid #a9bbc2;
        border-radius: 0;
        background: #f9fbfb;
        box-shadow: none;
      }
      .form-section:last-child {
        margin-bottom: 18px;
      }
      .section-head {
        padding: 15px 17px;
        background: linear-gradient(90deg, #cedde1, #e8eff1);
        border-color: #9fb2b9;
      }
      .section-head h2 {
        color: #082f3c;
        font-size: 15px;
      }
      .section-head i {
        color: #fff;
        background: #087b79;
      }
      .section-content {
        padding: 18px 17px 20px;
      }
      .field label {
        color: #304b56;
        font-size: 9px;
      }
      .form-control,
      .form-select {
        border-color: #9eb1b8;
        color: #102630;
        background: #fff;
      }
      .form-control::placeholder {
        color: #73878f;
      }
      .check-item {
        border-color: #9fb2b9;
        background: #edf3f4;
      }
      .preview-column,
      .preview-panel {
        display: none !important;
      }
      @media (max-width: 720px) {
        .app-layout {
          width: calc(100% - 16px);
        }
        .form-section {
          margin: 0 9px;
        }
      }

      /* Enhanced form typography and contrast */
      .form-column {
        color: #071c25;
      }
      .form-intro h1 {
        font-size: 24px;
        color: #041f2a;
      }
      .form-intro p {
        color: #344c56;
        font-size: 12px;
      }
      .form-intro small,
      .autosave {
        font-size: 10px;
      }
      .section-head h2 {
        color: #041f2a;
        font-size: 16px;
      }
      .section-head small {
        color: #3c535d;
        font-size: 10px;
      }

      function Repeater({ type, rows, setRows, isFresher = false, onFresher }) {

                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            ) : (
              <div className="fresher-status">Fresher — No previous work experience</div>
            )}
            <div className="repeater-actions">
              {(education || !isFresher) && (
                <button type="button" className="add-row" onClick={add}>
                  <i className="bi bi-plus-lg" /> {education ? "Add row" : "Add More"}
                </button>
              )}
              {!education && (
                <button
                  type="button"
                  className={`fresher-button ${isFresher ? "active" : ""}`}
                  onClick={onFresher}
                >
                  <i className="bi bi-person-check" /> {isFresher ? "Fresher Selected" : "Fresher"}
                </button>
              )}
            </div>
          </>
        );
      }
      function App() {
        const saved = useMemo(() => {
          try {
            return JSON.parse(localStorage.getItem("impost_hiring_form")) || {};
          } catch {
            return {};
          }
        }, []);
        const [data, setData] = useState({ ...initial, ...saved.data });
        const fixedQualifications = ["10th", "12th / Diploma", "Bachelor's"];
        const [education, setEducation] = useState(() => {
          const savedRows = saved.education || [];
          return Array.from(
            { length: Math.max(3, savedRows.length) },
            (_, index) => ({
              ...blankEducation(),
              ...(savedRows[index] || {}),
              qualification:
                index < fixedQualifications.length
                  ? fixedQualifications[index]
                  : savedRows[index]?.qualification || "",
            }),
          );
        });
        const [employment, setEmployment] = useState(
          saved.employment?.length
            ? saved.employment
            : [blankEmployment()],
        );
        const [toast, setToast] = useState("");
        const generatedAt = new Date().toLocaleString("en-IN");
        const set = (key, value) =>
          setData((current) => ({ ...current, [key]: value }));
        useEffect(() => {
          localStorage.setItem(
            "impost_hiring_form",
            JSON.stringify({ data, education, employment }),
          );
        }, [data, education, employment]);
        useEffect(() => {
          if (!data.dob) return;
          const today = new Date(),
            dob = new Date(data.dob);
          let age = today.getFullYear() - dob.getFullYear();
          if (
            today < new Date(today.getFullYear(), dob.getMonth(), dob.getDate())
          )
            age--;
          set("age", String(age));
        }, [data.dob]);
        const note = (text) => {
          setToast(text);
          setTimeout(() => setToast(""), 2600);
        };
        const reset = () => {
          if (!confirm("Clear the entire hiring form?")) return;
          setData(initial);
          setEducation([
            blankEducation("10th"),
            blankEducation("12th / Diploma"),
            blankEducation("Bachelor's"),
          ]);
          setEmployment([blankEmployment()]);
          localStorage.removeItem("impost_hiring_form");
          note("Form cleared");
        };
        const download = () => {
          if (!data.fullName) {
            note("Enter the candidate Full Name before downloading");
            return;
          }
          const show = (value) => value || "Not provided";
          const educationSummary = education
            .map(
              (row, index) =>
                `${index + 1}. ${show(row.qualification)} | ${show(row.institution)} | ${show(row.board)} | ${show(row.year)} | ${show(row.score)}`,
            )
            .join("\n");
          const employmentSummary = data.isFresher
            ? "Fresher"
            : employment.map(
              (row, index) =>
                `${index + 1}. ${show(row.company)} | ${show(row.designation)} | ${show(row.joining)} to ${show(row.relieving)}`,
            )
            .join("\n");
          const content = `IMPOST INDIA Â· EMPLOYEE HIRING SUMMARY
Generated: ${new Date().toLocaleString("en-IN")}
PERSONAL DETAILS
Full Name: ${show(data.fullName)}
Father's Name: ${show(data.fatherName)}
Father's Mobile Number: ${show(data.fatherMobile)}
Gender: ${show(data.gender)}
Date of Birth: ${show(data.dob)}
Age: ${show(data.age)}
Aadhaar Number: ${show(data.aadhaar)}
PAN Number: ${show(data.pan)}
CONTACT DETAILS
Mobile: ${show(data.mobile)}
Email: ${show(data.personalEmail)}
Current Address: ${show(data.currentAddress)}
Permanent Address: ${show(data.permanentAddress)}
EMERGENCY CONTACT
Name: ${show(data.emergencyName)}
Relationship: ${show(data.emergencyRelationship)}
Mobile: ${show(data.emergencyMobile)}
EDUCATIONAL DETAILS
Qualification | Institution | Board / University | Passing Year | Percentage / CGPA
${educationSummary}
EMPLOYMENT DETAILS
Company | Designation | Joining | Relieving
${employmentSummary}
KEY SKILLS
Skills: ${show(data.technicalSkills)}
Important Certifications: ${show(data.certifications)}
SALARY DETAILS
Basic Salary: ${show(data.basicSalary)}
Gross Salary: ${show(data.grossSalary)}
Net Salary: ${show(data.netSalary)}
BANK DETAILS
Account Holder: ${show(data.accountHolder)}
Bank Name: ${show(data.bankName)}
Account Number: ${show(data.accountNumber)}
IFSC: ${show(data.ifsc)}
This summary is system generated by IMPOST INDIA HRMS for official employment records.`;
          const link = document.createElement("a");
          link.href = URL.createObjectURL(
            new Blob([content], { type: "text/plain;charset=utf-8" }),
          );
          link.download = `${data.fullName.trim().replace(/\s+/g, "-")}-hiring-summary.txt`;
          link.click();
          URL.revokeObjectURL(link.href);
          note("Employee summary downloaded");
        };
        const submitToGoogleSheet = async () => {
          if (!data.fullName?.trim()) {
            note("Enter the candidate Full Name before submitting");
            return;
          }

          const now = new Date();
          const payload = {
            submittedAt: now.toISOString(),
            submissionDate: now.toLocaleDateString("en-IN"),
            submissionTime: now.toLocaleTimeString("en-IN"),
            ...data,
            isFresher: Boolean(data.isFresher),
            education,
            employment: data.isFresher ? [] : employment,
          };

          try {
            note("Submitting details...");

            await fetch(googleSheetWebAppUrl, {
              method: "POST",
              mode: "no-cors",
              body: JSON.stringify(payload),
            });

            setData(initial);
            setEducation([
              blankEducation("10th"),
              blankEducation("12th / Diploma"),
              blankEducation("Bachelor's"),
            ]);
            setEmployment([blankEmployment()]);
            localStorage.removeItem("impost_hiring_form");
            note("Details submitted. Form is ready for a new entry");
          } catch (error) {
            console.error("Google Sheet submission failed:", error);
            note("Submission failed. Check the internet connection");
          }
        };
        const salarySpecs = [
          ["basicSalary", "Basic Salary"],
          ["grossSalary", "Gross Salary"],
          ["netSalary", "Net Salary"],
        ];
        return (
          <>
            <header className="app-header">
              <div className="brand">
                <span className="brand-mark">II</span>
                <div>
                  <strong>IMPOST INDIA</strong>
                  <small>HRMS Â· Hiring & Joining</small>
                </div>
              </div>
              <div className="header-title">
                <strong>Employee Hiring & Joining Form</strong>
                <small>
                  Complete the information and generate the official employee
                  record
                </small>
              </div>
              <div className="header-actions">
                <button onClick={reset}>
                  <i className="bi bi-arrow-counterclockwise" />{" "}
                  <span>Reset</span>
                </button>
                <button onClick={() => window.print()}>
                  <i className="bi bi-printer" /> <span>Print</span>
                </button>
                <button className="primary" onClick={download}>
                  <i className="bi bi-file-earmark-text" />{" "}
                  <span>Download Summary</span>
                </button>
                <button className="primary" onClick={submitToGoogleSheet}>
                  <i className="bi bi-send-check" /> <span>Submit</span>
                </button>
              </div>
            </header>
            <div className="app-layout">
              <main className="form-column">
                <div className="form-intro">
                  <div>
                    <small>EMPLOYEE ONBOARDING</small>
                    <h1>Hiring information</h1>
                    <p>
                      All entered information is saved automatically on this
                      device.
                    </p>
                  </div>
                  <span className="autosave">
                    <i className="bi bi-cloud-check" /> Auto-saved
                  </span>
                </div>
                <FormSection
                  icon="bi-person-vcard"
                  title="Personal Details"
                  subtitle="Personal and identity details"
                >
                  <FieldGroup specs={groups.candidate} data={data} set={set} />
                </FormSection>
                <FormSection
                  icon="bi-telephone"
                  title="Contact Details"
                  subtitle="Personal, official and residential contact details"
                >
                  <FieldGroup specs={groups.contact} data={data} set={set} />
                </FormSection>
                <FormSection
                  icon="bi-person-exclamation"
                  title="Emergency Contact Details"
                  subtitle="Person to contact in an emergency"
                >
                  <FieldGroup specs={groups.emergency} data={data} set={set} />
                </FormSection>
                <FormSection
                  icon="bi-mortarboard"
                  title="Educational Details"
                  subtitle="Academic history and qualifications"
                >
                  <Repeater
                    type="education"
                    rows={education}
                    setRows={setEducation}
                  />
                </FormSection>
                <FormSection
                  icon="bi-building-check"
                  title="Employment Details"
                  subtitle="Previous work experience"
                >
                  <Repeater
                    type="employment"
                    rows={employment}
                    setRows={setEmployment}
                    isFresher={Boolean(data.isFresher)}
                    onFresher={() => {
                      const next = !data.isFresher;
                      set("isFresher", next);
                      if (next) setEmployment([blankEmployment()]);
                    }}
                  />
                </FormSection>
                <FormSection
                  icon="bi-lightbulb"
                  title="Key Skills"
                  subtitle="Skills required for the role"
                >
                  <FieldGroup specs={groups.skills} data={data} set={set} />
                </FormSection>
                <FormSection
                  icon="bi-cash-stack"
                  title="Salary Details"
                  subtitle="Essential salary figures only"
                >
                  <div className="field-grid">
                    {salarySpecs.map((x) => (
                      <Field key={x[0]} spec={x} data={data} set={set} />
                    ))}
                  </div>
                </FormSection>
                <FormSection
                  icon="bi-bank"
                  title="Bank Details"
                  subtitle="Essential salary account information"
                >
                  <FieldGroup specs={groups.bank} data={data} set={set} />
                </FormSection>
                <div className="candidate-signature-print">
                  <p>
                    I confirm that the information provided in this form is complete and correct.
                  </p>
                  <div className="candidate-signature-line">Candidate Signature</div>
                </div>
              </main>
            </div>
            {toast && (
              <div className="toast-note">
                <i className="bi bi-info-circle" /> {toast}
              </div>
            )}
          </>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
